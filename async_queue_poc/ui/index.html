<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Queue POC UI</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <header>
      <h1>Async Queue POC</h1>
      <div class="header-actions">
        <button id="run-test-btn" class="primary">Run Test</button>
        <button id="refresh-btn">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel" id="queues-panel">
        <h2>Queues</h2>
        <div id="queue-list" class="queue-list"></div>
      </section>

      <section class="panel" id="details-panel">
        <h2>Queue Details & Controls</h2>
        <div class="controls">
          <div class="control-group">
            <h3>Manual queue controls</h3>
            <label>
              Queue name
              <input id="queue-name-input" placeholder="demo" />
            </label>
            <button id="create-queue-btn">Create Queue</button>

            <label>
              Item payload
              <input id="item-input" placeholder="example-item" />
            </label>

            <div class="button-row">
              <button id="pause-btn">Pause</button>
              <button id="resume-btn">Resume</button>
              <button id="add-item-btn">Add Item</button>
            </div>
          </div>
        </div>

        <div id="selected-queue" class="selected-queue">
          <p>No queue selected.</p>
        </div>
      </section>

      <section class="panel" id="log-panel">
        <h2>Logs / Test Results</h2>

        <div class="log-stack">
          <section class="log-card" aria-label="LOG 1 activity log panel">
            <header class="log-card-header">
              <h3>LOG 1</h3>
              <p>Activity Log</p>
            </header>
            <div class="log-scroll-area">
              <ul id="activity-log" class="log-list activity-log-list"></ul>
            </div>
          </section>

          <section class="log-card" aria-label="LOG 2 sent items log panel">
            <header class="log-card-header">
              <h3>LOG 2</h3>
              <p>Sent Items Log</p>
            </header>
            <div class="log-scroll-area">
              <ul id="transport-log" class="log-list transport-log-list"></ul>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="/ui/app.js"></script>
  </body>
</html>
